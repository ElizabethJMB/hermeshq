version: 2

updates:
  # Backend Python deps
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types:
          - patch
          - minor

  # Frontend npm deps
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types:
          - patch
          - minor

  # WhatsApp bridge npm deps
  - package-ecosystem: npm
    directory: /backend/hermeshq/assets/whatsapp-bridge
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
